# The `@claude` mention workflow. It loads the **steer** plugin from the
# org marketplace so the in-CI agent runs under the SAME engineering standards
# as a local Claude Code session (steer's SessionStart hook injects rules/* once
# the plugin is installed) — CI Claude and local Claude stay consistent.
#
# One repo-level prerequisite (see README.md#github-actions-secrets):
#   ANTHROPIC_API_KEY — Anthropic API auth (below). The org marketplace repo
#   (element22llc/e22-plugins) is PUBLIC, so the `plugin_marketplaces` fetch
#   below clones it anonymously — no marketplace credential or GitHub App needed.
#
# NOTE: do NOT try to load steer via a settings.json `enabledPlugins` /
# `extraKnownMarketplaces` block — those are gated behind an interactive trust
# dialog that headless/CI mode skips, so they load nothing and fail silently.
# The action's `plugins` / `plugin_marketplaces` inputs are the only CI path.
name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

          # Load the org standards plugin so the in-CI agent runs under the SAME
          # steer ruleset as a local session (steer's SessionStart hook injects
          # rules/* once installed). plugin_marketplaces takes Git URLs; plugins
          # takes name@marketplace. The marketplace repo is public, so the clone
          # is anonymous — no credential needed (see the header note).
          plugin_marketplaces: |
            https://github.com/element22llc/e22-plugins.git
          plugins: |
            steer@e22-plugins

          # Optional: Customize the trigger phrase (default: @claude)
          # trigger_phrase: "/claude"

          # Optional: Trigger when specific user is assigned to an issue
          # assignee_trigger: "claude-bot"

          # Optional: Configure Claude's behavior with CLI arguments
          # claude_args: |
          #   --model claude-opus-4-8
          #   --max-turns 10
          #   --allowedTools "Bash(npm install),Bash(npm run build),Bash(npm run test:*),Bash(npm run lint:*)"
          #   --system-prompt "Follow our coding standards. Ensure all new code has tests. Use TypeScript for new files."

          # Optional: Advanced settings configuration
          # settings: |
          #   {
          #     "env": {
          #       "NODE_ENV": "test"
          #     }
          #   }
