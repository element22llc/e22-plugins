  - ask: "help me shape the acceptance criteria for this feature"
    skill: spec
    signals: ["acceptance criteria"]
  - ask: "sweep this draft spec for gaps and edge cases before I sign off"
    skill: spec
    signals: ["clarify", "edge cases"]
  - ask: "the client re-sent the requirements deck — what changed?"
    skill: intake
    signals: ["what changed", "docx"]
  - ask: "absorb this roadmap spreadsheet the PO handed over"
    skill: intake
    signals: ["spreadsheet", "roadmap"]
  - ask: "walk me through the open questions and let's answer them"
    skill: questions
    signals: ["open question"]
  - ask: "prepare a questionnaire the PO can fill in offline"
    skill: questions
    signals: ["questionnaire", "fillable"]

  # --- backlog / delivery -------------------------------------------------------
  - ask: "capture this idea in the backlog for later"
