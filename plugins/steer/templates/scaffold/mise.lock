# Placeholder lockfile — committed on purpose, do NOT delete.
# mise only writes `mise.lock` if the file already exists, so this placeholder
# is what makes `mise install` resolve the `latest` entries in mise.toml into
# exact pinned versions here. On a fresh fork: run `mise install`, then
# `mise lock --platform linux-x64,macos-arm64` (add other platforms your team
# uses; linux-x64 is required for CI), then commit the populated result. The
# `--platform` step writes per-platform url + checksum entries — without them
# CI's `mise install --locked` fails on linux-x64. See /steer:init step 4.
