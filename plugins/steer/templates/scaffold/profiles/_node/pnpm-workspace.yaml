# pnpm workspace — the internal monorepo. Apps and packages are discovered here;
# /configs holds shared config consumed by relative path, not as workspace packages.
packages:
  - "apps/*"
  - "packages/*"

# pnpm gates dependency build scripts behind its supply-chain policy. esbuild
# (pulled in via tsx) needs its postinstall to link its native binary, so it
# must be explicitly approved here or `pnpm install` fails with
# ERR_PNPM_IGNORED_BUILDS. Add an entry per dependency that legitimately needs
# to run a build script.
allowBuilds:
  esbuild: true

# `mise deps` runs `pnpm install` non-interactively (no TTY). When pnpm needs to
# rebuild node_modules from scratch — e.g. it was first created by a different
# pnpm major (a stray global pnpm vs the mise-pinned one) or the store version
# changed — it asks to confirm the purge, and with no TTY it aborts with
# ERR_PNPM_ABORTED_REMOVE_MODULES_DIR_NO_TTY. Auto-confirming lets the deps
# provider self-heal and converge node_modules onto the mise-pinned pnpm.
confirmModulesPurge: false

# pnpm 11 ships supply-chain defaults: `minimumReleaseAge` (1440 min = 1 day)
# refuses to install any package version published in the last 24h, transitive
# ones included. A plain `pnpm install` self-heals — it resolves transitive deps
# to aged versions and auto-adds any too-fresh DIRECT dep to a
# `minimumReleaseAgeExclude:` list here — so `mise deps` keeps working. The one
# case that hard-fails is a committed lockfile generated by an OLDER pnpm (or a
# stray global pnpm) that pinned fresh versions: ERR_PNPM_MINIMUM_RELEASE_AGE_-
# VIOLATION. Fix: regenerate it once under the mise-pinned pnpm —
# `mise exec --no-deps -- pnpm install --lockfile-only` — then commit. Do NOT set
# `minimumReleaseAge: 0` to silence it; that throws away the protection.

# Dependency versions are centralized here and referenced as "catalog:" in each
# package.json, so every app/package shares one version. Bump in one place; the
# exact installed versions are pinned in pnpm-lock.yaml (commit it).
catalog:
  typescript: ^6.0.3
  tsx: ^4.22.4
  "@types/node": ^25.9.1
