# steer — branch-protection policy (the real gate lives on GitHub, not in the session)
#
# steer is deliberately ADVISORY in the local session (see rule 95, "You are not
# the gate — the DEV is"). The hard wall against direct-push-to-main is GitHub
# branch protection on the default branch. This file is the single, machine-readable
# source of truth for what that protection must require; /steer:protect reads it,
# diffs it against the repo's live settings, and — only on the dev's confirmation —
# applies it via `gh api`. The prose in the scaffold README points HERE; it does
# not restate these values.
#
# Fields map 1:1 to the GitHub classic branch-protection API
#   (PUT /repos/{owner}/{repo}/branches/{branch}/protection)
# so /steer:protect can diff and apply directly. Repository rulesets are a modern
# alternative with the same intent; this policy is API-agnostic enough to back a
# rulesets path later without changing the values.
#
# A repo MAY override this by shipping its own policy/branch-protection.yml
# (resolved consumer-first, then this plugin-bundled default — same precedence as
# policy/versions.yml). Tighten, don't quietly loosen: a weaker per-repo policy
# should be backed by an ADR.

schema: 1

# Which branch to protect. "default" resolves to the repo's default branch.
branch: default

# A PR — reviewed and approving — before anything lands.
required_pull_request_reviews:
  required_approving_review_count: 1
  dismiss_stale_reviews: true          # new commits invalidate stale approvals

# The `ci` gate must be green and the branch up to date before merge.
# context is the check-run name; /steer:protect resolves the real name from
# .github/workflows/ci.yml rather than trusting this string blindly.
required_status_checks:
  strict: false
  contexts:
    - ci

# No bypassing — even for admins — unless the team explicitly decides otherwise.
enforce_admins: true

# Keep history linear (squash/rebase merges only).
required_linear_history: true

# Repo-level security, applied via a SEPARATE settings API by /steer:protect.
secret_scanning: true
secret_scanning_push_protection: true

# Dependabot — keep dependencies patched. Alerts + automated security updates are
# repo-level settings /steer:protect enables alongside secret scanning (each via
# its own endpoint). NOTE: GitHub's repo-wide `allow_auto_merge` is deliberately
# NOT enabled — that switch exposes the auto-merge button to EVERY PR. Auto-merge
# is scoped to Dependabot by the workflow itself (see the exception below), so no
# repo-wide setting is needed.
dependabot_alerts: true
dependabot_security_updates: true

# ── Documented exception to required_pull_request_reviews ─────────────────────
# The human-review requirement above (1 approval) is the gate for PRs that touch
# application logic. Dependabot version bumps do not, so steer waives the *human*
# review for the low-risk subset and lets those PRs auto-merge:
#   - SCOPE: patch + minor updates only (where most security fixes land). MAJOR
#     bumps are EXCLUDED — they can carry breaking changes and may need a
#     policy/versions.yml floor decision, so they stay human-reviewed.
#   - STILL ENFORCED: the `ci` required check. Auto-merge only completes once CI
#     is green and the branch is up to date, so a bump that breaks tests, lint, or
#     the version-pin scan never lands. CI — not a human — guarantees the bump is
#     safe; only the review is waived, never the tests.
#   - ENACTED BY: .github/workflows/dependabot-auto-merge.yml (installed via the
#     scaffold / /steer:sync), NOT by /steer:protect. That workflow waits for the
#     required `ci` check, then merges the single Dependabot PR directly — no
#     repo-wide auto-merge setting is involved. protect configures repo settings;
#     it never opens PRs or merges.
# If a repo wants ZERO automated merges, delete that workflow — the human gate
# then applies to Dependabot too.
