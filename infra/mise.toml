# Dedicated infra toolchain + tasks. Run these from within infra/ so this config
# applies — the repo-root mise.toml carries the plugin/docs toolchain and is kept
# free of infra concerns on purpose.
#
# State backend uses native S3 locking (use_lockfile), so OpenTofu must be >= 1.10.

[tools]
opentofu = "1.12"
terragrunt = "1.0"
# Cloudflare Pages CLI for the local `cf:*` deploy tasks (needs node for the npm backend).
node = "lts"
"npm:wrangler" = "4"

[settings]
lockfile = true

[env]
# OpenTofu, Terragrunt, and aws CLI use this file (not ~/.aws/config). Override in `.env` if needed.
AWS_CONFIG_FILE = "{{ config_root }}/aws/config"
AWS_SSO_SESSION = "e22"
# Ensure named profiles and SSO from the shared config file are honored by AWS SDKs.
AWS_SDK_LOAD_CONFIG = "1"
# On a laptop (SSO/profile), the SDK still tries the EC2 metadata endpoint first; each attempt can
# block ~10s before falling through. Terragrunt re-resolves credentials many times per command
# (includes, dependency units), which made runs take 60s+. Unset in `.env` if you run IaC from EC2
# and rely on an instance profile.
AWS_EC2_METADATA_DISABLED = "true"
_.file = ".env"

[tasks."aws:sso:login"]
description = "Authenticate with AWS SSO - run once before IaC commands"
run = 'aws sso login --sso-session "${AWS_SSO_SESSION}"'

[tasks."tf:fmt"]
description = "Format all Terragrunt HCL + OpenTofu files under infra/"
run = ["terragrunt hcl fmt", "tofu fmt -recursive"]

[tasks."tf:validate"]
description = "Validate the ai.element-22.com DNS unit"
dir = "live/dns"
run = "terragrunt validate"

[tasks."tf:plan"]
description = "Plan the ai.element-22.com DNS unit"
dir = "live/dns"
run = "terragrunt plan"

[tasks."tf:apply"]
description = "Apply the ai.element-22.com DNS unit"
dir = "live/dns"
run = "terragrunt apply"

# --- Cloudflare Pages: test the docs deploy locally before relying on CI ---
# wrangler reads CLOUDFLARE_API_TOKEN + CLOUDFLARE_ACCOUNT_ID from infra/.env
# (loaded via `_.file = ".env"` above; .env is gitignored — see .env.example).

[tasks."cf:check"]
description = "Verify Cloudflare credentials (CLOUDFLARE_* from infra/.env) before deploying"
run = "wrangler whoami"

[tasks."cf:deploy:preview"]
description = "Build the docs and deploy a Cloudflare Pages PREVIEW from your machine — mirrors the CI deploy so you can verify it before pushing"
# Build + deploy from the repo root, where `docs:build` and its `site/` output live.
dir = "{{ config_root }}/.."
run = [
  "mise run docs:build",
  # Any --branch other than the project's production branch publishes a preview
  # deployment with its own *.pages.dev URL, leaving production untouched.
  "wrangler pages deploy site --project-name=e22-ai-docs --branch=local-preview --commit-dirty=true",
]

[tasks."cf:access:verify"]
description = "Check a URL is gated by Cloudflare Access (expects a 302 redirect to the Access login, NOT a public 200). Pass a preview *.pages.dev URL or the default production host."
run = '''
url="{{arg(name='url', default='https://ai.element-22.com')}}"
result=$(curl -sI -o /dev/null -w '%{http_code} %{redirect_url}' "$url")
echo "HEAD $url → $result"
case "$result" in
  *cloudflareaccess.com*) echo "✅ Access is enforcing — site is gated, not public." ;;
  *) echo "❌ $url is NOT behind Access (no redirect to the Access login). Do not cut over."; exit 1 ;;
esac
'''
