# Placeholder lockfile — committed on purpose, do NOT delete.
# mise only writes `mise.lock` if the file already exists, so this placeholder
# is what makes `mise install` (run from /infra) resolve the `latest` entries
# in infra/mise.toml into exact pinned versions here. On a fresh fork: run
# `cd infra && mise install`, then `mise lock --platform linux-x64,macos-arm64`
# (add the platforms your team uses; linux-x64 required if CI loads infra), then
# commit the populated result — it is the real pin for OpenTofu/Terragrunt/AWS
# CLI. The `--platform` step writes per-platform url + checksum entries; without
# them `mise install --locked` fails on linux-x64 (see /steer:init step 4).
