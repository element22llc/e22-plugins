name: Docs site

# Builds the Zensical docs site and publishes it to GitHub Pages.
#
# The `build` job runs the strict build on every PR and push, so broken docs
# (dead links/nav) fail before reaching `main` — a gap the `mise run ci` gate
# (structure-only `validate_docs.py`) does not cover. The `deploy` job publishes
# the built site to GitHub Pages, and only ever runs from `main`.
#
# Setup: repo Settings → Pages → Source = "GitHub Actions" (one-time). The site
# is served at https://ai.element-22.com via the custom domain pinned by the
# tracked `docs/CNAME` file; DNS (Route 53 CNAME → element22llc.github.io) lives
# in the private element22llc/e22-plugins-infra repo. No secrets required — the
# marketplace repo is public and the deploy uses the built-in GITHUB_TOKEN OIDC.

on:
  pull_request:
    paths:
      - docs/**
      - mkdocs.yml
      - .github/workflows/docs-deploy.yml
  push:
    branches:
      - main
    paths:
      - docs/**
      - mkdocs.yml
      - .github/workflows/docs-deploy.yml
  workflow_dispatch:

# Least privilege at the top level: only read the repo (the build job checks out
# and builds). The deploy job widens to the Pages-specific scopes it needs.
permissions:
  contents: read

# Never run two Pages deploys at once; let a newer push supersede an in-flight
# one rather than cancelling (avoids a half-published site). `github-pages` is
# the conventional group name for the Pages deployment concurrency lock.
concurrency:
  group: github-pages
  cancel-in-progress: false

# Force mise to install the standard (GIL-enabled) precompiled CPython, not the
# free-threaded build. Current mise resolves a bare `python = "3.14"` to the
# free-threaded interpreter and ignores the locked URL for the core:python
# backend. Zensical ships only abi3 wheels, which can't load on a free-threaded
# ABI, so uv falls back to compiling zensical from Rust source — which is what
# broke this build. This env var is the only lever that flips the flavor; it must
# be set before mise-action runs `mise install`.
env:
  MISE_PYTHON_PRECOMPILED_FLAVOR: install_only_stripped

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install mise
        uses: jdx/mise-action@v4

      - name: Build docs (strict)
        # Reuse the single-source-of-truth task: uv run --group docs
        # zensical build --strict → site/. --strict fails on broken links/nav.
        run: mise run docs:build

      - name: Pin custom domain (CNAME)
        # GitHub Pages drops the custom domain on each Actions deploy unless a
        # CNAME file is present at the site root. docs/CNAME is the tracked
        # source of truth; copy it in case the builder did not carry it over.
        run: cp docs/CNAME site/CNAME

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    # Validate on PRs (build job only); publish only from main.
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    # Pages deployment needs these scopes; id-token is used by deploy-pages to
    # mint the short-lived OIDC token GitHub Pages authenticates with.
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
