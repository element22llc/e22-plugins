# e22-standards — version-pin policy (deterministic source of truth)
#
# This file encodes ELEMENT 22 POLICY for pinned runtime / backing-service major
# versions. It is what both the interactive hook (check-version-pins.sh) and the
# CI scanner (scan-version-pins.sh) enforce — deterministically, with no network
# call and no jq dependency, so a build is reproducible and a hook never fails
# open for lack of a tool.
#
# GOVERNANCE — what the numbers mean:
#   minimum_supported  the E22-approved floor. A pinned major BELOW this is denied.
#                      This is POLICY, and may be STRICTER than upstream EOL.
#   recommended        the major to target. At/above minimum_supported but below
#                      recommended → advisory (supported, but behind the org target).
#   denied             explicit majors that are disallowed (defense-in-depth /
#                      specific bad pins), denied even if the floor logic wouldn't.
#
# Upstream end-of-life (endoflife.date) is INPUT to maintaining this file, not the
# runtime authority: the scheduled refresh workflow
# (.github/workflows/version-policy-refresh.yml) compares these minimums against
# upstream EOL and opens an issue/PR when they lag. Enforcement never calls it.
#
# To deliberately keep a denied/old pin in a repo, annotate the line with
#   # e22:allow-pin <reason>
# and record an ADR (versioning policy). Unknown products are not enforced.

schema: 1

products:
  postgres:
    minimum_supported: "14"
    recommended: "17"
    denied: ["9", "10", "11", "12", "13"]
  mysql:
    minimum_supported: "8"
    recommended: "8"
    denied: ["5"]
  mariadb:
    minimum_supported: "10"
    recommended: "11"
    denied: []
  mongo:
    minimum_supported: "6"
    recommended: "8"
    denied: ["4", "5"]
  redis:
    minimum_supported: "7"
    recommended: "7"
    denied: ["5", "6"]
  valkey:
    minimum_supported: "7"
    recommended: "8"
    denied: []
  node:
    minimum_supported: "20"
    recommended: "22"
    denied: ["16", "18"]
  python:
    minimum_supported: "3.10"
    recommended: "3.13"
    denied: ["3.7", "3.8", "3.9"]
  nginx:
    minimum_supported: "1.26"
    recommended: "1.27"
    denied: []
