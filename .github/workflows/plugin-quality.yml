name: Plugin quality

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

# Force mise to install the standard (GIL-enabled) precompiled CPython, not the
# free-threaded build. Current mise resolves a bare `python = "3.14"` to the
# free-threaded interpreter and ignores the locked URL for the core:python
# backend, so without this the gate would silently run on a free-threaded ABI
# that diverges from local dev (and breaks any abi3-only wheel). Keep CI on the
# same standard interpreter the docs build uses. Must be set before mise-action.
env:
  MISE_PYTHON_PRECOMPILED_FLAVOR: install_only_stripped

jobs:
  plugin-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # full history so the changelog behaviour gate can diff the base

      - name: Install mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0

      - name: Sync Python environment
        run: uv sync --locked

      - name: Install Claude Code (pinned)
        # Reproducible validation: install the version pinned in mise.toml (single
        # source of truth), not whatever "latest" happens to be at run time. The
        # installer takes the target as a positional arg.
        #
        # Supply-chain note — accepted risk: install.sh is fetched live from
        # claude.ai and is NOT checksum-pinned. The CLI *version* it installs is
        # pinned above, but the installer script itself can change between runs;
        # checksum-pinning it would break on every installer release for a script
        # that only bootstraps a pinned artifact. Deliberate accept (issue #341).
        run: |
          ver=$(grep -E '^STEER_CLAUDE_CODE_VERSION' mise.toml | sed -E 's/.*"([^"]+)".*/\1/')
          echo "Installing Claude Code ${ver}"
          curl -fsSL https://claude.ai/install.sh | bash -s -- "${ver}"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run full validation
        run: mise run ci

      - name: Changelog behaviour gate (PRs)
        if: github.event_name == 'pull_request'
        run: uv run python scripts/check_changelog.py --base "${{ github.event.pull_request.base.sha }}"

      - name: Docs-impact gate (PRs)
        if: github.event_name == 'pull_request'
        run: uv run python scripts/check_docs_impact.py --base "${{ github.event.pull_request.base.sha }}"

  # Non-blocking early-warning signal: does the plugin still validate against the
  # latest Claude Code? Surfaces upstream breakage without gating merges (the
  # pinned job above is authoritative).
  validator-compat:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Claude Code (latest)
        # Live-fetched installer + floating "latest": deliberate — this job exists
        # to surface upstream breakage early and is non-blocking. Same accepted
        # install.sh live-fetch risk as the pinned job (issue #341).
        run: |
          curl -fsSL https://claude.ai/install.sh | bash -s -- latest
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Validate marketplace + plugin against latest
        run: |
          claude plugin validate .
          claude plugin validate plugins/steer
