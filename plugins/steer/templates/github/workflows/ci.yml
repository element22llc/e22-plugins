name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# The `ci` job is the single required status check on `main`. It ALWAYS runs
# stack-AGNOSTIC hygiene (actionlint, shellcheck, the version-pin scan), then
# runs the checks for whatever stack it DETECTS in the repo:
#   - Node/TS   when package.json or pnpm-workspace.yaml is present
#   - Python    when a pyproject.toml is present
# A detected stack with NO test contract FAILS the build — so a green `ci` is
# never a false "tests ran". Before any app exists, the stack steps simply don't
# run and the job reports that application validation is not yet active. See
# README.md#branch-protection.
#
# Note on testing: there is deliberately NO test-file-name gate (a filename check
# can't tell a real test from an empty one). Test presence is enforced by the rule
# in CLAUDE.md, the Definition of Done, human review, and the "stack detected but no
# test script -> fail" guards below. Coverage is a SIGNAL, not a target: the Coverage
# step reports it and gates only the lines a PR changes (no global %). See
# CLAUDE.md#definition-of-done and CONVENTIONS.md -> Coverage.

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # Full history so the coverage step can diff changed lines against the
          # PR base branch (diff-cover). Cheap; harmless on push builds.
          fetch-depth: 0

      # Install all tools defined in mise.toml — Node, Python, OpenTofu,
      # shellcheck, actionlint, etc. Nested mise.toml files (e.g. /infra/mise.toml)
      # are picked up automatically. mise-action auto-adds `--locked` whenever a
      # `mise.lock` exists, so a committed (populated) lock installs the exact
      # pins and fails LOUDLY if it is malformed — never silently degrading to
      # `latest`. Before /steer:init|adopt pins the toolchain there is no lock
      # at all, so this runs a plain unlocked install instead of failing. The
      # template ships no placeholder lock; /steer:init|adopt creates and commits
      # a populated one (see /steer:reference conventions).
      - name: Setup mise
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true

      # ────────────────────────────────────────────────────────────────────
      # ACTIVE — stack-agnostic hygiene. Always runs; makes the required `ci`
      # check do real work regardless of the product's stack.
      # ────────────────────────────────────────────────────────────────────

      - name: Lint GitHub Actions workflows (actionlint)
        run: actionlint -color

      - name: Lint shell scripts (shellcheck)
        run: |
          # Lint every tracked shell script. Passes cleanly when there are none.
          mapfile -t scripts < <(git ls-files '*.sh' '*.bash')
          if [ ${#scripts[@]} -eq 0 ]; then
            echo "No shell scripts found — nothing to lint."
          else
            printf '%s\n' "${scripts[@]}"
            shellcheck "${scripts[@]}"
          fi

      # Version-pin policy: the committed-state backstop for the interactive
      # version-pin hook. Fails on an image/tool major pinned below
      # policy/versions.yml. Deterministic — no network, no jq.
      - name: Version-pin policy scan
        run: sh scripts/scan-version-pins.sh .

      # Secret scanning: enable GitHub-native secret scanning + push protection in
      # repo Settings → Code security. It runs outside Actions and is the canonical
      # secret-scan mechanism — see README.md#branch-protection. No CI step needed.

      # ────────────────────────────────────────────────────────────────────
      # Stack detection — which stacks are actually present in this repo.
      # ────────────────────────────────────────────────────────────────────
      - name: Detect stack
        id: detect
        run: |
          node=false
          python=false
          tf=false
          ansible=false
          pulumi=false
          if [ -f package.json ] || [ -f pnpm-workspace.yaml ]; then node=true; fi
          if [ -f pyproject.toml ] || git ls-files '*/pyproject.toml' | grep -q .; then python=true; fi
          # Infra / IaC. Keep these signals in lockstep with steer_repo_does_iac
          # in plugins/steer/hooks/lib/scope.sh (the rule-injection predicate):
          # Ansible needs ansible.cfg, a site playbook, or roles/ AND playbooks/
          # together — a bare roles/ dir (RBAC/IAM roles, a roles/ package) is NOT
          # Ansible and must not trip the lint.
          if git ls-files '*.tf' '*.hcl' | grep -q .; then tf=true; fi
          if [ -f ansible.cfg ] || [ -f site.yml ] || [ -f site.yaml ] || { [ -d roles ] && [ -d playbooks ]; }; then ansible=true; fi
          if [ -f Pulumi.yaml ] || [ -f Pulumi.yml ]; then pulumi=true; fi
          {
            echo "node=$node"
            echo "python=$python"
            echo "tf=$tf"
            echo "ansible=$ansible"
            echo "pulumi=$pulumi"
          } >> "$GITHUB_OUTPUT"
          if [ "$node" = false ] && [ "$python" = false ] && [ "$tf" = false ] && [ "$ansible" = false ] && [ "$pulumi" = false ]; then
            echo "::notice::No application or infra stack detected (no package.json / pyproject.toml / *.tf / Ansible / Pulumi layout). Stack-agnostic hygiene ran; stack validation is not yet active."
          fi

      # ────────────────────────────────────────────────────────────────────
      # Node/TS — runs only when a Node workspace is detected. pnpm + Biome are
      # installed by mise. Root scripts fan out across apps/* + packages/*.
      # ────────────────────────────────────────────────────────────────────
      - name: Install dependencies (Node)
        if: steps.detect.outputs.node == 'true'
        # Freeze only once a lockfile exists (a fresh fork has none until
        # /steer:init generates it); self-tightening thereafter.
        run: |
          if [ -f pnpm-lock.yaml ]; then
            pnpm install --frozen-lockfile
          else
            echo "No pnpm-lock.yaml yet — installing without frozen lockfile."
            pnpm install --no-frozen-lockfile
          fi

      - name: Lint + format check (Biome — Node/TS)
        if: steps.detect.outputs.node == 'true'
        run: biome ci .

      - name: Type check (Node/TS)
        if: steps.detect.outputs.node == 'true'
        run: pnpm run typecheck

      - name: Test (Node/TS)
        if: steps.detect.outputs.node == 'true'
        # A detected stack with no test script would let `pnpm run test`
        # (--if-present) no-op to green. Fail instead — green must mean tests ran.
        run: |
          if ! git ls-files '*package.json' | xargs grep -lE '"test"[[:space:]]*:' >/dev/null 2>&1; then
            echo "::error::Node workspace detected but no package defines a \"test\" script — a green CI would not mean tests ran. Add tests (Definition of Done)."
            exit 1
          fi
          # Emit coverage (coverage/lcov.info) when a Vitest coverage provider is
          # wired; otherwise run tests plain. The changed-line gate below stays
          # fail-open when no report is produced. See CONVENTIONS.md -> Coverage.
          if git ls-files '*package.json' | xargs grep -lq '@vitest/coverage' 2>/dev/null; then
            pnpm run test -- --coverage --coverage.reporter=lcov
          else
            pnpm run test
          fi

      # ────────────────────────────────────────────────────────────────────
      # Python — runs only when a pyproject.toml is detected. Uncomment
      # python/uv/ruff in mise.toml so they install above.
      # ────────────────────────────────────────────────────────────────────
      - name: Lint + format check (Ruff — Python)
        if: steps.detect.outputs.python == 'true'
        run: |
          ruff check .
          ruff format --check .

      - name: Test (Python)
        if: steps.detect.outputs.python == 'true'
        # pytest exit 5 = no tests collected; treat a detected-but-untested project
        # as a failure rather than a false green.
        run: |
          # Emit coverage (coverage.xml) when pytest-cov is available; otherwise
          # run tests plain. The changed-line gate below stays fail-open when no
          # report is produced. See CONVENTIONS.md -> Coverage.
          cov_args=""
          if uv run python -c "import pytest_cov" >/dev/null 2>&1; then
            cov_args="--cov --cov-report=xml --cov-report=term-missing"
          fi
          rc=0
          # shellcheck disable=SC2086
          uv run pytest $cov_args || rc=$?
          if [ "$rc" -eq 5 ]; then
            echo "::error::Python project detected but pytest collected no tests. Add tests (Definition of Done)."
            exit 1
          fi
          exit "$rc"

      # ────────────────────────────────────────────────────────────────────
      # Infra / IaC — runs only when Terraform/OpenTofu (*.tf/*.hcl) or an
      # Ansible layout is detected. Tools install from mise (opentofu, uv); these
      # checks need no cloud credentials (format + lint only, no init/plan/apply).
      # ────────────────────────────────────────────────────────────────────
      - name: Format check (OpenTofu/Terraform)
        if: steps.detect.outputs.tf == 'true'
        # `*.tf`/`*.hcl` is detected repo-wide, but `tofu` is only on PATH when the
        # ROOT toolchain pins it — i.e. an infra-profile repo. An app-profile
        # monorepo keeps its IaC tools in `infra/mise.toml` (not the root), so
        # `tofu` is absent here: skip with a notice rather than failing the
        # required `ci` check with `tofu: command not found`. That repo's infra is
        # validated from its own toolchain. Format only — no `init`/`validate`,
        # which would need a backend and creds.
        run: |
          if ! command -v tofu >/dev/null 2>&1; then
            echo "::notice::*.tf/*.hcl present but 'tofu' is not on PATH at the repo root (an app-profile repo pins IaC tools under infra/, not root). Skipping the root format check."
            exit 0
          fi
          tofu fmt -check -recursive -diff

      - name: Lint Ansible (ansible-lint)
        if: steps.detect.outputs.ansible == 'true'
        # ansible-lint auto-discovers playbooks/roles and is well-targeted. Run via
        # uvx (uv is pinned by the infra mise.toml). yamllint runs too, but only
        # when the repo opts in with a .yamllint config (avoids flagging unrelated
        # YAML like workflow files).
        run: |
          if ls .yamllint .yamllint.yml .yamllint.yaml >/dev/null 2>&1; then
            uvx yamllint .
          fi
          uvx ansible-lint

      # Coverage is a SIGNAL, not a target: we report it and gate only the lines
      # a change touches ("cover what you touch") — never a global percentage.
      # On a PR, the floor runs against the PR base branch. On push to `main` it
      # is the **solo-trunk Definition-of-Done floor**: solo-trunk has no PR, so
      # this push-time run is its only changed-line gate — it enforces ONLY in
      # solo-trunk (in pr-flow the PR already gated these lines; re-gating a
      # post-merge push would wedge `main`) and diffs against the previous commit.
      # Fail-open when no coverage report was produced, the base can't be
      # resolved, or it is the first push, so this never blocks a repo that hasn't
      # wired coverage yet. Tune the floor with the COVERAGE_DIFF_MIN env var.
      # See rules 41-coverage / 50 (Definition of Done) and CONVENTIONS.md -> Coverage.
      - name: Coverage (changed-line gate)
        if: >-
          (github.event_name == 'pull_request' || github.event_name == 'push') &&
          (steps.detect.outputs.node == 'true' || steps.detect.outputs.python == 'true')
        env:
          COVERAGE_DIFF_MIN: "80"
          EVENT: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
          BEFORE: ${{ github.event.before }}
        run: |
          ZERO=0000000000000000000000000000000000000000
          report=""
          if [ -f coverage/lcov.info ]; then report="coverage/lcov.info"; fi
          if [ -f coverage.xml ]; then report="coverage.xml"; fi
          if [ -z "$report" ]; then
            echo "::notice::No coverage report produced — wire pytest-cov / @vitest/coverage to measure coverage (see CONVENTIONS.md -> Coverage). Skipping changed-line gate."
            exit 0
          fi
          if [ "$EVENT" = "pull_request" ]; then
            base="origin/${BASE_REF}"
            if ! git fetch --no-tags --quiet origin "$BASE_REF" 2>/dev/null; then
              echo "::notice::Could not fetch base branch '$BASE_REF' — skipping changed-line coverage (fail-open)."
              exit 0
            fi
          else
            # push to main: the solo-trunk DoD floor (pr-flow already gated via PR).
            if ! grep -Eiq '^[[:space:]]*<!--[[:space:]]*steer:delivery-mode=solo-trunk[[:space:]]*-->' CLAUDE.md 2>/dev/null; then
              echo "::notice::push to main in pr-flow — the PR already gated coverage; skipping push-time floor."
              exit 0
            fi
            if [ -z "${BEFORE:-}" ] || [ "$BEFORE" = "$ZERO" ]; then
              echo "::notice::No prior commit to diff against (first push) — skipping changed-line coverage (fail-open)."
              exit 0
            fi
            base="$BEFORE"
          fi
          echo "## Coverage (changed lines vs $base)" >> "$GITHUB_STEP_SUMMARY"
          uvx diff-cover "$report" \
            --compare-branch "$base" \
            --fail-under "$COVERAGE_DIFF_MIN" \
            --markdown-report coverage-diff.md \
          || { cat coverage-diff.md >> "$GITHUB_STEP_SUMMARY"; \
               echo "::error::Changed lines are under ${COVERAGE_DIFF_MIN}% covered — cover the code you touched (rule 41-coverage)."; \
               exit 1; }
          cat coverage-diff.md >> "$GITHUB_STEP_SUMMARY"

      # ────────────────────────────────────────────────────────────────────
      # EXAMPLES — uncomment when they apply to your stack.
      # ────────────────────────────────────────────────────────────────────
      # Build: add a `build` script per app (Next.js, tsup, …); the root `build`
      # script fans out with --if-present.
      # - name: Build
      #   if: steps.detect.outputs.node == 'true'
      #   run: pnpm run build

  # ──────────────────────────────────────────────────────────────────────────
  # ADVISORY — runs the design.md linter when any DESIGN.md changes. NOT a
  # required check; remove `continue-on-error` to make it block.
  # ──────────────────────────────────────────────────────────────────────────
  design-lint:
    name: design.md lint (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Find changed DESIGN.md files
        id: changed
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          base="${BASE_SHA:-HEAD~1}"
          files=$(git diff --name-only "$base" HEAD -- '**/DESIGN.md' 'DESIGN.md' || true)
          {
            echo "files<<EOF"
            echo "$files"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Lint changed DESIGN.md files
        if: steps.changed.outputs.files != ''
        env:
          CHANGED_FILES: ${{ steps.changed.outputs.files }}
        run: |
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            echo "Linting $f"
            npx --yes @google/design.md lint "$f"
          done <<< "$CHANGED_FILES"

  # ──────────────────────────────────────────────────────────────────────────
  # ADVISORY — spec-drift gate. Warns (never blocks) when a change touches
  # application behavior without updating a feature `contract.md` / `intent.md`
  # or `spec/HISTORY.md`. Pure shell + git: no stack, no Python — runs for every
  # repo. Resolve a warning by updating the spec in the same change, or confirm
  # via the PR template's "Spec sync" checkbox that there is no behavior change.
  # This is the machine surface of rule 55 (drift gates). Runs on PR and on push
  # to main (the latter is the only enforcer in solo-trunk, which has no PR).
  # Remove `continue-on-error` and switch `::warning::` → `::error::` + a final
  # `exit 1` to make it block.
  # ──────────────────────────────────────────────────────────────────────────
  spec-drift:
    name: spec-drift (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Detect undocumented behavior change
        env:
          EVENT: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          BEFORE: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -eu
          ZERO=0000000000000000000000000000000000000000
          if [ "$EVENT" = "pull_request" ]; then
            range="${BASE_SHA}...HEAD"
          elif [ "${BEFORE:-$ZERO}" = "$ZERO" ]; then
            echo "::notice::No prior commit to diff against (first push) — skipping spec-drift (fail-open)."
            exit 0
          else
            range="${BEFORE}..${HEAD_SHA}"
          fi
          changed=$(git diff --name-only "$range" || true)
          [ -n "$changed" ] || exit 0
          # Behavior surfaces (coarse, stack-agnostic); exempt tests.
          behavior=$(printf '%s\n' "$changed" \
            | grep -E '^(apps|packages|src|services|lib|app)/' \
            | grep -Ev '(^|/)(tests?|__tests__|e2e|fixtures)/|\.(test|spec)\.[A-Za-z0-9]+$' \
            || true)
          # Any feature contract/intent or HISTORY touch clears the gate.
          spec=$(printf '%s\n' "$changed" \
            | grep -E '^spec/features/.+/(contract|intent)\.md$|^spec/HISTORY\.md$' \
            || true)
          if [ -n "$behavior" ] && [ -z "$spec" ]; then
            {
              echo "## Spec drift (advisory)"
              echo
              echo "Behavior changed but no \`spec/features/<id>/contract.md\`, \`intent.md\`,"
              echo "or \`spec/HISTORY.md\` was updated in this change. Update the spec in the"
              echo "same change, or confirm via the PR template's **Spec sync** checkbox that"
              echo "there is no behavior change."
              echo
              echo "Behavior paths flagged:"
              printf '%s\n' "$behavior" | sed 's/^/- /'
            } >> "$GITHUB_STEP_SUMMARY"
            printf '%s\n' "$behavior" | while IFS= read -r f; do
              [ -z "$f" ] && continue
              echo "::warning file=${f}::Behavior changed without a spec/contract/HISTORY update (spec-drift, advisory)"
            done
          fi

  # `ai-slop` is ADVISORY — scans for low-quality patterns agents leave behind
  # (undeclared/hallucinated imports, decorative/restating comments, …) and
  # publishes them to the Security tab as code-scanning annotations. NOT a
  # required check: `continue-on-error` + the SARIF path mean it never blocks a
  # PR. Its differentiated value is the `ai-slop/*` rules; the security and
  # complexity rules overlap with checks the `ci` job already runs (ruff/bandit,
  # Biome), so `.aislop/config.yml` turns those duplicates down (see that file).
  # Pinned to an exact version for reproducibility (pre-1.0 tool — bump
  # deliberately). Promote to a blocking gate only once it has earned trust:
  # swap `scan` for `aislop ci` (exits non-zero below `ci.failBelow`) and drop
  # `continue-on-error`. PR-only to keep cost and noise down.
  ai-slop:
    name: ai-slop (advisory)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Scan for AI slop (SARIF)
        run: npx --yes aislop@0.12.1 scan . --sarif > aislop.sarif

      - name: Upload results to code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: aislop.sarif
          category: ai-slop
