# The `@claude` mention workflow. It loads the **steer** plugin from the
# org marketplace so the in-CI agent runs under the SAME engineering standards
# as a local Claude Code session (steer's SessionStart hook injects rules/* once
# the plugin is installed) — CI Claude and local Claude stay consistent.
#
# Two repo-level prerequisites (see README.md#github-actions-secrets):
#   1. ANTHROPIC_API_KEY — Anthropic API auth (below).
#   2. marketplace read access — the org marketplace repo is PRIVATE, and a
#      product repo's default GITHUB_TOKEN cannot clone another org repo, so the
#      `plugin_marketplaces` fetch needs a credential. A shared GitHub App (one
#      org-controlled credential, not per-repo PATs) supplies it: set the
#      org-level variable STEER_APP_ID and secret STEER_APP_PRIVATE_KEY once, and
#      the step below mints a short-lived (1 h, auto-revoked) token scoped to
#      read-only on just the marketplace repo. If STEER_APP_ID is unset the steps
#      no-op and the clone goes anonymous (fine once the marketplace is public).
#
# NOTE: do NOT try to load steer via a settings.json `enabledPlugins` /
# `extraKnownMarketplaces` block — those are gated behind an interactive trust
# dialog that headless/CI mode skips, so they load nothing and fail silently.
# The action's `plugins` / `plugin_marketplaces` inputs are the only CI path.
name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      # Mint a short-lived, read-only token for the PRIVATE org marketplace repo
      # so the `plugin_marketplaces` fetch below succeeds. Uses a shared GitHub
      # App (one org-controlled credential) rather than per-repo PATs. The token
      # is scoped to just the marketplace repo and auto-revoked after the run.
      # Skipped when STEER_APP_ID is unset — then the clone goes anonymous, which
      # is correct once the marketplace is public.
      - name: Mint marketplace read token (GitHub App)
        id: marketplace_token
        if: ${{ vars.STEER_APP_ID != '' }}
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.STEER_APP_ID }}
          private-key: ${{ secrets.STEER_APP_PRIVATE_KEY }}
          owner: element22llc
          repositories: e22-plugins

      - name: Authenticate marketplace clone
        env:
          MARKETPLACE_TOKEN: ${{ steps.marketplace_token.outputs.token }}
        run: |
          if [ -n "$MARKETPLACE_TOKEN" ]; then
            git config --global \
              url."https://x-access-token:${MARKETPLACE_TOKEN}@github.com/".insteadOf \
              "https://github.com/"
          else
            echo "No marketplace token (STEER_APP_ID unset) — assuming a public marketplace; cloning anonymously."
          fi

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

          # Load the org standards plugin so the in-CI agent runs under the SAME
          # steer ruleset as a local session (steer's SessionStart hook injects
          # rules/* once installed). plugin_marketplaces takes Git URLs; plugins
          # takes name@marketplace. See the header note on the clone token.
          plugin_marketplaces: |
            https://github.com/element22llc/e22-plugins.git
          plugins: |
            steer@e22-plugins

          # Optional: Customize the trigger phrase (default: @claude)
          # trigger_phrase: "/claude"

          # Optional: Trigger when specific user is assigned to an issue
          # assignee_trigger: "claude-bot"

          # Optional: Configure Claude's behavior with CLI arguments
          # claude_args: |
          #   --model claude-opus-4-8
          #   --max-turns 10
          #   --allowedTools "Bash(npm install),Bash(npm run build),Bash(npm run test:*),Bash(npm run lint:*)"
          #   --system-prompt "Follow our coding standards. Ensure all new code has tests. Use TypeScript for new files."

          # Optional: Advanced settings configuration
          # settings: |
          #   {
          #     "env": {
          #       "NODE_ENV": "test"
          #     }
          #   }
