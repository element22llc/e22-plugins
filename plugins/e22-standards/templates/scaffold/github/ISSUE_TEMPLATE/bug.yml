name: Bug
description: Something is broken or not working as expected
title: "[Bug] "
type: Bug
labels: ["source:human", "needs:triage"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe what you saw.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: How to reproduce
      description: Steps to make it happen again.
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See ...
  - type: textarea
    id: media
    attributes:
      label: Screenshots or video
      description: Attach anything that shows the problem.
  - type: dropdown
    id: where
    attributes:
      label: Where did this happen?
      options:
        - Production
        - Non-prod
        - Local
        - Not sure
    validations:
      required: true
  - type: dropdown
    id: frequency
    attributes:
      label: How often?
      options:
        - Every time
        - Sometimes
        - Once, but it was bad
    validations:
      required: true
