[tools]
python = "3.14"
uv = "0.11"
shellcheck = "latest"
shfmt = "latest"
actionlint = "latest"
# Local-only dev tools (node + the codegraph MCP code-intelligence server) are
# NOT listed here: they are not used by CI (Claude Code is installed via
# install.sh and Python via `uv sync`), and `codegraph@latest` cannot be pinned
# to a lockfile URL, which breaks `mise install --locked` on CI. Install them
# per-machine via a gitignored `mise.local.toml` — see AUTHORING.md.

[settings]
# Pin every tool resolution into mise.lock for reproducible installs.
lockfile = true

[env]
# Single source of truth for the Claude Code version the REQUIRED CI job installs,
# so `claude plugin validate` is reproducible and the authoritative result can't
# drift without a repo change. Bump deliberately after reviewing a new release.
# A separate, non-blocking CI job runs `latest` for an early compatibility signal.
STEER_CLAUDE_CODE_VERSION = "2.1.153"

# Pin the precompiled CPython flavor for every `mise install` in this env,
# mirroring the CI workflows (.github/workflows/plugin-quality.yml,
# docs-deploy.yml) which set it at job level. Without it, mise resolves
# python="latest" to the *free-threaded* 3.14 build, whose source-build /
# abi3-wheel path is slow and flaky (see PR #107). This matters most for the
# E2E suite: `/steer:init` runs `mise install` inside a throwaway scaffold repo
# (python="latest"), and this var is inherited by that subprocess — so local
# `mise run e2e` / `e2e:local` gets CI's fast, deterministic install instead of
# an intermittent multi-minute build that pushed the init scenario past the cap.
MISE_PYTHON_PRECOMPILED_FLAVOR = "install_only_stripped"

[tasks.lint]
description = "Lint and format-check Python code"
run = ["uv run ruff check .", "uv run ruff format --check ."]

[tasks.plugin-check]
description = "Run plugin hygiene + standards-consistency + release checks"
run = [
  "uv run python scripts/check_plugin.py",
  "uv run python scripts/check_standards.py",
  # The committed Copilot instructions artifact must stay in sync with rules/.
  "uv run python scripts/check_copilot_instructions.py",
  # The committed Copilot prompt-file artifacts must stay in sync with skills/.
  "uv run python scripts/check_copilot_prompts.py",
  # Release validator (no base ref → release-validator only; safe locally).
  "uv run python scripts/check_changelog.py",
  # Validate both the marketplace manifest (root) and the plugin manifest.
  "claude plugin validate .",
  "claude plugin validate plugins/steer",
]

[tasks.fixtures]
description = "Run golden fixture contract checks"
run = ["uv run python scripts/check_fixtures.py"]

[tasks.test]
description = "Run Python tests"
run = ["uv run pytest"]

[tasks.actions]
description = "Lint GitHub Actions workflows (this repo's own + the shipped scaffold template)"
run = [
  # Bare invocation scans this repo's .github/workflows/.
  "actionlint",
  # The shipped scaffold workflow lives outside .github/, so actionlint never
  # sees it by default — lint it explicitly (also shellchecks its run: blocks).
  "actionlint plugins/steer/templates/github/workflows/ci.yml",
]

[tasks.shell]
description = "Lint and format-check shell scripts (plugin hooks + libs + scripts + tests)"
run = [
  # ShellCheck is the hard gate (see .shellcheckrc for the few intentional disables).
  "shellcheck plugins/steer/hooks/*.sh plugins/steer/hooks/lib/*.sh plugins/steer/hooks/tests/*.sh plugins/steer/scripts/*.sh",
  # shfmt is advisory: report style drift but don't fail CI on the hooks'
  # hand-written formatting. Run `shfmt -w` locally to apply.
  "shfmt -d plugins/steer/hooks/*.sh plugins/steer/hooks/lib/*.sh plugins/steer/hooks/tests/*.sh plugins/steer/scripts/*.sh || true",
]

[tasks.hooktests]
description = "Run the POSIX-sh hook fixture suite (deterministic; no network)"
run = ["sh plugins/steer/hooks/tests/run.sh"]

[tasks.version-scan]
description = "Scan the repo for version pins that violate policy/versions.yml"
run = ["sh plugins/steer/scripts/scan-version-pins.sh ."]

[tasks."gen:copilot"]
description = "Regenerate the Copilot instructions (from rules/) + prompt-file artifacts (from skills/)"
run = [
  "uv run python scripts/gen_copilot_instructions.py --write",
  "uv run python scripts/gen_copilot_prompts.py --write",
]

# Documentation site (Zensical + mermaid). The Zensical toolchain lives in
# the `docs` dependency-group so it is NOT installed by the default `uv sync`
# the CI env uses — serve/build pull it in on demand via `uv run --group docs`.
[tasks."docs:serve"]
description = "Serve the documentation site locally with live reload"
run = ["uv run --group docs zensical serve"]

[tasks."docs:build"]
description = "Build the documentation site (strict: fail on broken links/nav)"
run = ["uv run --group docs zensical build --strict"]

[tasks."docs:check"]
description = "Validate docs structure + sync with source of truth (no docs deps)"
run = ["uv run python scripts/validate_docs.py"]

[tasks.check]
description = "Run fast local checks (pre-commit equivalent)"
depends = ["lint", "plugin-check", "actions"]

[tasks.delivery-gates]
description = "Run the PR-only branch-diff gates (changelog + docs impact) vs origin/main"
run = ["sh scripts/delivery-gates.sh"]

[tasks.ci]
description = "Run full CI-equivalent validation"
depends = [
  "check",
  "fixtures",
  "test",
  "shell",
  "hooktests",
  "version-scan",
  "docs:check",
  "delivery-gates",
]

# Headless end-to-end skill suite — drives the real `claude` CLI against a
# throwaway repo and asserts on the files a skill produces. SLOW and spends
# tokens, so it is deliberately NOT in `ci`'s depends (stays off the PR path)
# and no longer runs in CI at all — it is a local-only tier now, run on demand
# via `mise run e2e` / `e2e:local`. Skips unless ANTHROPIC_API_KEY /
# CLAUDE_CODE_OAUTH_TOKEN is set (or STEER_E2E_LOCAL=1 for the seat variant).
[tasks."e2e"]
description = "Run the headless end-to-end skill suite (slow, costs tokens; needs ANTHROPIC_API_KEY)"
# -rP surfaces each scenario's captured turns/cost line even when the test passes
# (pytest otherwise swallows stdout on green). In CI the same figure is also
# written to $GITHUB_STEP_SUMMARY.
run = ["uv run pytest -m e2e -rP"]

# Local variant: run the suite on your interactive `claude` login (subscription
# seat) instead of API tokens — run `claude /login` once first. `env -u
# ANTHROPIC_API_KEY` drops the key for this run so Claude Code bills the seat (it
# prefers the key when present); STEER_E2E_LOCAL=1 flips the skip-guard on. No
# --max-budget-usd is sent (no API dollar cost on a seat); the per-scenario
# wall-clock timeout still bounds a runaway.
#
# Run a single scenario (one ~3-min skill run instead of all) by forwarding -k:
#   mise run e2e:local -- -k init        # init scenarios only
#   mise run e2e:local -- -k adopt       # the adopt scenario
#   mise run e2e:local -- -k test_sync_is_noop_when_current
[tasks."e2e:local"]
description = "Run the E2E suite on your local Claude seat, no API charge (run `claude /login` first)"
run = ["env -u ANTHROPIC_API_KEY STEER_E2E_LOCAL=1 uv run pytest -m e2e -rP"]
