# Zensical configuration for the e22-plugins documentation site.
#
# Zensical (the Material for MkDocs team's successor) reads this mkdocs.yml
# natively; the filename is kept so scripts/validate_docs.py and the nav below
# keep working unchanged.
#
# Served locally with `mise run docs:serve` and built (strict) with
# `mise run docs:build`. The toolchain lives in the `docs` dependency-group
# (see pyproject.toml). The nav below is the source of truth for site
# structure; scripts/validate_docs.py asserts every nav entry resolves to a
# real file and every docs/*.md is reachable from it.
#
# Zensical builds every file under docs_dir (it has no `exclude_docs` setting),
# so non-page content is kept OUT of docs/: page scaffolds live in the repo-root
# `docs-templates/` and the authoring guide is the repo-root `AUTHORING.md`.
site_name: e22-plugins — steer
site_description: Engineering-standards plugin marketplace — the steer plugin.
# Served from the branded root domain (Route 53 CNAME → Cloudflare Pages, behind
# Cloudflare Access); sets the canonical/asset base for root-path serving.
site_url: https://ai.element-22.com/
docs_dir: docs
# `mise run docs:build` writes the build here (gitignored). Published to GitHub
# Pages from this output by .github/workflows/docs-deploy.yml.
site_dir: site
use_directory_urls: true

theme:
  # `classic` matches the Material for MkDocs look & feel (vs Zensical's `modern`).
  variant: classic
  features:
    - navigation.sections
    - navigation.top
    - navigation.instant
    - content.code.copy
    - toc.follow
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

markdown_extensions:
  - admonition
  - attr_list
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  # mermaid.js diagrams: Material renders fenced ```mermaid blocks client-side
  # via this custom superfence. No extra plugin/dependency required.
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - Home: index.md
  - Getting started:
      - Installation: getting-started/installation.md
      - First workflow: getting-started/first-workflow.md
      - Team onboarding: getting-started/team-onboarding.md
  - Concepts:
      - Product spine: concepts/product-spine.md
      - Lifecycle: concepts/lifecycle.md
      - Authorization model: concepts/authorization-model.md
  - Workflows:
      - Overview: workflows/index.md
      - Adopt: workflows/adopt.md
      - Spec: workflows/spec.md
      - Issues: workflows/issues.md
      - Work: workflows/work.md
      - Build: workflows/build.md
  - Reference:
      - Skills: reference/skills.md
      - Subagents: reference/agents.md
      - Hooks: reference/hooks.md
      - Configuration: reference/configuration.md
      - GitHub Actions integration: reference/github-integration.md
      - MCP servers: reference/mcp-servers.md
      - Repository contract: reference/repository-contract.md
  - Team rollout:
      - Known limitations: reference/known-limitations.md
      - Launch checklist: team-rollout/launch-checklist.md
  - Decisions: decisions/index.md
  - Contributing:
      - Documentation: contributing/documentation.md
      - Release process: contributing/release-process.md
