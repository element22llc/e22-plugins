name: Docs site

# Builds the Zensical docs site and publishes it to Cloudflare Pages.
#
# The `build` job runs the strict build on every PR and push, so broken docs
# (dead links/nav) fail before reaching `main` — a gap the `mise run ci` gate
# (structure-only `validate_docs.py`) does not cover. The `deploy` job uploads
# the built site to Cloudflare Pages, and only ever runs from `main`.
#
# Setup: the Cloudflare Pages project (Direct Upload, name `e22-ai-docs`) and the
# CLOUDFLARE_API_TOKEN + CLOUDFLARE_ACCOUNT_ID repo secrets must exist. The site
# is served from https://ai.element-22.com (Route 53 CNAME → <project>.pages.dev)
# behind Cloudflare Access. See infra/README.md.

on:
  pull_request:
    paths:
      - docs/**
      - mkdocs.yml
      - .github/workflows/docs-deploy.yml
  push:
    branches:
      - main
    paths:
      - docs/**
      - mkdocs.yml
      - .github/workflows/docs-deploy.yml
  workflow_dispatch:

# Least privilege: only read the repo. The deploy job authenticates to Cloudflare
# with an API token secret, so no extra GITHUB_TOKEN scopes are needed.
permissions:
  contents: read

# Never run two Cloudflare Pages deploys at once; let a newer push supersede an
# in-flight one rather than cancelling (avoids a half-published site).
concurrency:
  group: cloudflare-pages
  cancel-in-progress: false

# Force mise to install the standard (GIL-enabled) precompiled CPython, not the
# free-threaded build. Current mise resolves a bare `python = "3.14"` to the
# free-threaded interpreter and ignores the locked URL for the core:python
# backend. Zensical ships only abi3 wheels, which can't load on a free-threaded
# ABI, so uv falls back to compiling zensical from Rust source — which is what
# broke this build. This env var is the only lever that flips the flavor; it must
# be set before mise-action runs `mise install`.
env:
  MISE_PYTHON_PRECOMPILED_FLAVOR: install_only_stripped

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install mise
        uses: jdx/mise-action@v4

      - name: Build docs (strict)
        # Reuse the single-source-of-truth task: uv run --group docs
        # zensical build --strict → site/. --strict fails on broken links/nav.
        run: mise run docs:build

      - name: Upload built site
        uses: actions/upload-artifact@v7
        with:
          name: site
          path: site
          retention-days: 1

  deploy:
    # Validate on PRs (build job only); publish only from main.
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download built site
        uses: actions/download-artifact@v8
        with:
          name: site
          path: site

      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy site --project-name=e22-ai-docs --branch=main
