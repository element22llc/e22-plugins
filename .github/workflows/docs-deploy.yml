name: Docs site

# Builds the Zensical docs site and publishes it to GitHub Pages.
#
# The `build` job runs the strict build on every PR and push, so broken docs
# (dead links/nav) fail before reaching `main` — a gap the `mise run ci` gate
# (structure-only `validate_docs.py`) does not cover. The `deploy` job publishes
# the artifact, and only ever runs from `main`.
#
# One-time setup: Settings → Pages → Source must be set to "GitHub Actions",
# otherwise the deploy job fails with "Pages not enabled".

on:
  pull_request:
    paths:
      - docs/**
      - mkdocs.yml
      - .github/workflows/docs-deploy.yml
  push:
    branches:
      - main
    paths:
      - docs/**
      - mkdocs.yml
      - .github/workflows/docs-deploy.yml
  workflow_dispatch:

# Least privilege by default; the deploy job adds pages/id-token below.
permissions:
  contents: read

# Never run two Pages deploys at once; let a newer push supersede an in-flight
# one rather than cancelling (avoids a half-published site).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install mise
        uses: jdx/mise-action@v4

      - name: Build docs (strict)
        # Reuse the single-source-of-truth task: uv run --group docs
        # zensical build --strict → site/. --strict fails on broken links/nav.
        run: mise run docs:build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    # Validate on PRs (build job only); publish only from main.
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
