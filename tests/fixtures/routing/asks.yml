    signals: ["capture", "backlog"]
  - ask: "triage the backlog and decompose the big items"
    skill: issues
    signals: ["triage", "decompose"]
  - ask: "show me a ranked board of what's in flight"
    skill: issues
    signals: ["board", "ranked"]
  - ask: "fix issue #123"
    skill: work
    signals: ["fix #123"]
  - ask: "implement this change now"
    skill: work
    signals: ["implement a change now"]
  - ask: "resume the issue I was working on yesterday"
    skill: work
    signals: ["resume", "issue"]
  - ask: "production is down — ship an emergency hotfix"
    skill: work
    signals: ["hotfix", "production incident"]
  - ask: "audit the overall health of this repo"
