[tools]
python = "3.14"
uv = "0.11"
shellcheck = "latest"
shfmt = "latest"
actionlint = "latest"

[settings]
# Read the runtime from .python-version so mise and uv agree on the interpreter.
idiomatic_version_file_enable_tools = ["python"]
# Pin every tool resolution into mise.lock for reproducible installs.
lockfile = true

[tasks.lint]
description = "Lint and format-check Python code"
run = [
  "uv run ruff check .",
  "uv run ruff format --check .",
]

[tasks.plugin-check]
description = "Run plugin hygiene + standards-consistency checks"
run = [
  "uv run python scripts/check_plugin.py",
  "uv run python scripts/check_standards.py",
  "claude plugin validate plugins/e22-standards",
]

[tasks.fixtures]
description = "Run golden fixture contract checks"
run = [
  "uv run python scripts/check_fixtures.py",
]

[tasks.test]
description = "Run Python tests"
run = [
  "uv run pytest",
]

[tasks.actions]
description = "Lint GitHub Actions workflows"
run = [
  "actionlint",
]

[tasks.shell]
description = "Lint and format-check shell scripts (plugin hooks + libs + tests)"
run = [
  # ShellCheck is the hard gate (see .shellcheckrc for the few intentional disables).
  "shellcheck plugins/e22-standards/hooks/*.sh plugins/e22-standards/hooks/lib/*.sh plugins/e22-standards/hooks/tests/*.sh",
  # shfmt is advisory: report style drift but don't fail CI on the hooks'
  # hand-written formatting. Run `shfmt -w` locally to apply.
  "shfmt -d plugins/e22-standards/hooks/*.sh plugins/e22-standards/hooks/lib/*.sh plugins/e22-standards/hooks/tests/*.sh || true",
]

[tasks.hooktests]
description = "Run the POSIX-sh hook fixture suite (network stubbed via fixtures)"
run = [
  "sh plugins/e22-standards/hooks/tests/run.sh",
]

[tasks.check]
description = "Run fast local checks (pre-commit equivalent)"
depends = [
  "lint",
  "plugin-check",
  "actions",
]

[tasks.ci]
description = "Run full CI-equivalent validation"
depends = [
  "check",
  "fixtures",
  "test",
  "shell",
  "hooktests",
]
