# steer — version-pin policy (deterministic source of truth)
#
# This file encodes the version POLICY for pinned runtime / backing-service major
# versions. It is what both the interactive hook (check-version-pins.sh) and the
# CI scanner (scan-version-pins.sh) enforce — deterministically, with no network
# call and no jq dependency, so a build is reproducible and a hook never fails
# open for lack of a tool.
#
# GOVERNANCE — what the numbers mean:
#   minimum_supported  the approved floor. A pinned major BELOW this is denied.
#                      This is POLICY, and may be STRICTER than upstream EOL.
#   denied             explicit majors that are disallowed (defense-in-depth /
#                      specific bad pins), denied even if the floor logic wouldn't.
#
# This is an EOL FLOOR, not a version chooser. WHAT to pin (current stable) is
# resolved live, in-session, per the versioning rule (/steer:conventions → check
# the registry / endoflife.date) and then committed to compose / mise.lock; this
# file only blocks dead majors when that live check didn't happen. There is
# deliberately no "recommended"/advisory tier — it would duplicate the live rule
# and silently rot.
#
# Upstream end-of-life (endoflife.date) is INPUT to maintaining this file, not the
# runtime authority: the scheduled refresh workflow
# (.github/workflows/version-policy-refresh.yml) compares these floors against
# upstream EOL and opens a PR that raises them. Enforcement never calls it.
#
# To deliberately keep a denied/old pin in a repo, annotate the line with
#   # steer:allow-pin <reason>
# and record an ADR (versioning policy). Unknown products are not enforced.

schema: 1

products:
  postgres:
    minimum_supported: "14"
    denied: ["9", "10", "11", "12", "13"]
  mysql:
    minimum_supported: "8"
    denied: ["5"]
  mariadb:
    minimum_supported: "10"
    denied: []
  mongo:
    minimum_supported: "7"
    denied: ["4", "5"]
  redis:
    minimum_supported: "7"
    denied: ["5", "6"]
  valkey:
    minimum_supported: "7"
    denied: []
  node:
    minimum_supported: "22"
    denied: ["16", "18"]
  python:
    minimum_supported: "3.10"
    denied: ["3.7", "3.8", "3.9"]
  nginx:
    minimum_supported: "1.30"
    denied: []
