# Routing regression fixtures — validated by scripts/check_routing_fixtures.py.
#
# Each fixture records a representative plain-language user ask, the skill that
# owns it, and the signal keywords the mapping routes on. Every signal must
# appear (case-insensitively) in the always-on routing surface: the union of
# rules/00-router.md and the owning skill's description + when_to_use
# frontmatter. When trimming that surface (PLAN.md Phase 1), a failure here
# means the trim removed vocabulary an ask depends on — restore the keyword or
# consciously update the fixture with the replacement vocabulary.
#
# Keep asks realistic (what a user would actually type), one skill per fixture,
# and signals minimal (1-2 distinctive keywords, not full sentences).

fixtures:
  # --- bootstrap / onboarding -------------------------------------------------
  - ask: "set up this new repo on our standards"
    skill: setup
    signals: ["set up", "onboard"]
  - ask: "bring this repo onto the standards"
    skill: setup
    signals: ["onto the standards"]
  - ask: "get us synced to the latest plugin version"
    skill: setup
    signals: ["sync to the latest plugin"]
  - ask: "bootstrap a brand-new empty repo spec-first"
    skill: init
    signals: ["bootstrap", "spec spine"]
  - ask: "there are [Replace ...] placeholders left over from the template"
    skill: init
    signals: ["placeholders", "template"]
  - ask: "this app was vibe-coded — no spec, no toolchain; adopt it"
    skill: adopt
    signals: ["vibe-coded", "adopt"]
  - ask: "reverse-engineer a spec from this existing codebase"
    skill: adopt
    signals: ["reverse-engineer", "existing repo"]
  - ask: "mise: command not found — get my machine ready"
    skill: doctor
    signals: ["command not found", "prerequisites"]
  - ask: "apply the pending structural migrations from the last plugin release"
    skill: sync
    signals: ["migrations", "plugin release"]
  - ask: "give me a read-only report of scaffold drift vs the current templates"
    skill: sync
    signals: ["--check", "drift"]

  # --- spec authoring / product owner flows ------------------------------------
  - ask: "I'm not a developer but I want to build an app from my idea"
