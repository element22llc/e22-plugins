# mise — polyglot tool version manager
# Install: https://mise.jdx.dev/getting-started.html
# Activate: add `eval "$(mise activate bash)"` or equivalent to your shell rc
#
# Version strategy (no hand-maintained numbers in this template):
#   - Tools below resolve to `latest`, so the template never carries stale pins.
#   - `lockfile = true` + the committed placeholder `mise.lock` make `mise install`
#     write the exact resolved versions into the lock. CAUTION: mise only writes
#     `mise.lock` if the file already exists — that is why the placeholder is
#     committed; never delete it. The populated lockfile is the real pin; CI and
#     every machine install from it, so they always agree.
#   - First-run setup pins on adoption: run `mise install` (and `cd infra && mise
#     install`), THEN `mise lock --platform linux-x64,macos-arm64` in each
#     directory with a lock — `mise install` only records asset URLs for the host
#     platform, so a lock pinned on macOS has no `linux-x64` entries and CI's
#     `mise install --locked` fails ("No lockfile URL found … on platform
#     linux-x64"). Add `macos-x64`/`linux-arm64`/`windows-x64` for any other
#     platform the team uses; `linux-x64` is mandatory because CI runs there.
#     Verify each `mise.lock` now holds `[tools.<tool>."platforms.linux-x64"]`
#     url + checksum blocks (not just versions), then commit them.
#   - Bump intentionally later with `mise upgrade` (updates the lock); review the
#     bump like any other change. Run /steer:reference conventions for the full rationale.

[settings]
lockfile = true

[tools]
# `latest` + the lockfile means you never edit versions here by hand.
# Backends must be cross-platform: pick one whose binaries exist for BOTH macOS
# and Linux. The mise registry default is not always safe — e.g. plain `pnpm`
# maps to `aqua:pnpm/pnpm`, which has no valid macOS asset, so we pin `npm:pnpm`
# explicitly. When adding a tool, verify `mise install` works on macOS and Linux
# (CI runs Linux) before committing.
#
# Two groups below: an agent-runtime baseline every repo keeps, and stack-specific
# tools you prune to match the product.

# --- Agent-runtime baseline: ALWAYS installed, never delete — even in a
# single-language product. AI agent tooling and MCP servers run packages on
# demand through these runtimes: `npx <pkg>` (Node) and `uvx <pkg>` (Python) —
# e.g. the steer plugin's markitdown MCP server runs via `uvx markitdown-mcp`.
# Pruning them breaks document conversion and any npx/uvx-based agent tool.
node = "latest"
python = "latest"
uv = "latest"                   # also the default Python package/project manager
github-cli = "latest"           # gh — PRs, releases, CI workflow runs from the terminal

# --- Stack-specific: keep what matches the product, delete the rest.
"npm:pnpm" = "latest"                 # npm backend on purpose — aqua:pnpm/pnpm lacks macOS assets
biome = "latest"                      # default Node linter + formatter (https://biomejs.dev)
"aqua:koalaman/shellcheck" = "latest" # shell lint (CI gate)
"aqua:rhysd/actionlint" = "latest"    # GitHub Actions workflow lint (CI gate)
# ruff = "latest"               # default Python linter + formatter (https://docs.astral.sh/ruff) — uncomment for Python products
# Coverage tooling is a project dependency, not pinned here: add pytest-cov
# (Python) / @vitest/coverage-v8 (Node) to the app. CI reports coverage and gates
# changed lines via `uvx diff-cover` (uv is already pinned above). See CONVENTIONS.md.
# go = "latest"
# rust = "latest"
# awscli = "latest"

# Infrastructure tooling (OpenTofu + Terragrunt) is intentionally NOT pinned at
# the repo root — it's pinned in /infra/mise.toml so only contributors who work
# under /infra need it installed. See /infra/README.md.

[env]
# Per-worktree runtime isolation: derive a stable host-port offset + a unique
# COMPOSE_PROJECT_NAME so parallel Claude Code worktrees of this repo don't
# collide on Docker containers/volumes or host ports (Postgres, the dev server).
# The primary checkout gets offset 0 (ports unchanged), so single-checkout dev
# is unaffected. Sourced on every `mise run …`; see scripts/worktree-env.sh.
_.source = "scripts/worktree-env.sh"

# Project-specific non-secret environment variables may go here.
# Secrets do NOT belong in this file.
# Use a git-ignored .env / .env.local for local secrets and SSM Parameter Store (SecureString) / Secrets Manager for deployed environments.

[tasks."dev:setup"]
description = "One-command local env: services up, schema migrated, data seeded (idempotent)"
# The standard entry point for local dev (`mise run dev:setup`). Tasks live
# here — not in package.json — because they orchestrate tooling outside the Node
# workspace (Docker, DB) and must work identically for Python (uv) products.
#
# Baseline wired to the default stack (Postgres via compose.yaml + Drizzle).
# Adapt on fork (/steer:init): Python products swap the pnpm calls below for
# `uv run …`; products without a database delete the db:* tasks and compose.yaml.
run = [
  "mise run docker:up",
  "mise run db:migrate",
  "mise run db:seed",
]

[tasks."docker:up"]
description = "Start local backing services (compose.yaml) and wait until healthy"
run = "docker compose up -d --wait"

[tasks."docker:down"]
description = "Stop this worktree's backing services (data volumes are kept)"
# Scoped to COMPOSE_PROJECT_NAME (set per worktree by scripts/worktree-env.sh),
# so it only stops the containers this checkout started.
run = "docker compose down"

[tasks."docker:clean"]
description = "Tear down this worktree's services AND volumes (run before removing a worktree)"
# Full teardown for end-of-worktree cleanup: removes this worktree's containers,
# named volumes, and orphans — leaving no leaked Docker resources behind. Scoped
# to this worktree's COMPOSE_PROJECT_NAME, so a sibling worktree's stack is
# untouched. Stop any background dev server (the WEB_PORT process) separately.
run = "docker compose down --volumes --remove-orphans"

[tasks."db:migrate"]
description = "Apply DB migrations in every workspace package that defines db:migrate"
# --if-present → no-ops until an app/package defines a db:migrate script
# (e.g. drizzle-kit migrate). The starter app has none, so a fresh clone passes.
run = "pnpm --recursive --if-present run db:migrate"

[tasks."db:seed"]
description = "Seed local dev data in every workspace package that defines db:seed"
run = "pnpm --recursive --if-present run db:seed"
